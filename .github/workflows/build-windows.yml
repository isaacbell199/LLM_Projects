name: Build Windows

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ÉTAPE INDISPENSABLE : Active les chemins longs pour les dépendances llama-cpp
      - name: Enable long paths
        run: |
          git config --system core.longpaths true
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v "LongPathsEnabled" /t REG_DWORD /d 1 /f

      # ÉTAPE INDISPENSABLE : Prépare le compilateur MSVC pour llama-cpp-sys-2
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Vulkan SDK
        shell: powershell
        run: |
          $installerUrl = "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe"
          $installerPath = "$env:TEMP\vulkan-sdk.exe"
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
          Start-Process -FilePath $installerPath -ArgumentList "--accept-licenses --default-answer --confirm-command install" -NoNewWindow -Wait
          $vulkanSdkPath = "C:\VulkanSDK"
          $latestVersion = (Get-ChildItem $vulkanSdkPath | Sort-Object -Descending | Select-Object -First 1).Name
          $vulkanPath = "$vulkanSdkPath\$latestVersion"
          echo "VULKAN_SDK=$vulkanPath" >> $env:GITHUB_ENV
          echo "$vulkanPath\Bin" >> $env:GITHUB_PATH

      # MISE À JOUR : On change la clé du cache pour forcer un nettoyage propre
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-v2-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-rust-v2-

      - name: Install frontend dependencies
        run: bun install

      - name: Build frontend
        run: bun run build
        env:
          NEXT_STATIC_EXPORT: "true"

      - name: Build Tauri app
        run: |
          bun tauri build --target x86_64-pc-windows-msvc --bundles nsis,msi
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Get version from Cargo.toml
        id: get_version
        shell: powershell
        run: |
          $version = (Get-Content src-tauri/Cargo.toml | Select-String 'version = "(.*)"').Matches.Groups[1].Value
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexaStory-Windows-${{ steps.get_version.outputs.VERSION }}
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NexaStory v${{ github.ref_name }}
          files: artifacts/**/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
